# SPDX-License-Identifier: AGPL-3.0-or-later
#
# flatpak-builder manifest for paladin-gtk (Flathub).
#
# Per docs/IMPLEMENTATION_PLAN_04_GTK.md §11.4, this manifest builds against
# org.gnome.Platform//47 (which bundles GTK 4.16 + libadwaita 1.6,
# matching the workspace's gtk4 (v4_16) / libadwaita (v1_6) crate
# features) and ships the same install payload as the .deb / .rpm
# manifests staged inside the /app/ Flatpak prefix:
#
#   /app/bin/paladin-gtk
#   /app/share/applications/org.tamx.Paladin.Gui.desktop
#   /app/share/metainfo/org.tamx.Paladin.Gui.metainfo.xml
#   /app/share/icons/hicolor/<size>/apps/...
#
# The sandbox posture is strict: only the Wayland and X11-fallback
# display sockets, IPC for clipboard, and `create`-scoped writes
# into the paladin XDG namespace (xdg-data/paladin and
# xdg-config/paladin). No `--share=network` (docs/DESIGN.md §3 / §5
# "No network, no telemetry"), no host filesystem portals.
#
# Cargo runs `--offline --locked --release` so Flathub builds
# reproducibly without network access at build time; vendored
# Cargo deps ride alongside the release tarball
# (docs/IMPLEMENTATION_PLAN_04_GTK.md §"Reproducible builds").
#
# The contract pinned by this file is covered by
# crates/paladin-gtk/tests/packaging_flatpak_manifest_logic.rs;
# changes here that break that contract fail
# `cargo test --workspace --all-targets` independently of whether
# `flatpak-builder` itself is installed on the runner.

app-id: org.tamx.Paladin.Gui
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: paladin-gtk

# §11.4 sandbox permissions. Each entry is reviewed in
# docs/IMPLEMENTATION_PLAN_04_GTK.md §11.4; additions need a plan update
# first (the contract test rejects unrecognized entries).
finish-args:
  # Wayland is the primary display socket on modern GNOME / KDE.
  - --socket=wayland
  # X11 fallback covers sessions where Wayland is unavailable; the
  # underlying widget stack already handles the protocol selection
  # through GDK, so both sockets land here.
  - --socket=fallback-x11
  # IPC is required for gdk::Clipboard (copy / paste of OTP codes
  # and clipboard image imports for QR add).
  - --share=ipc
  # Scoped write into $XDG_DATA_HOME/paladin/ — where the vault
  # files live (docs/DESIGN.md §4). `:create` lets paladin-gtk create
  # the directory on first run; nothing outside that namespace is
  # reachable.
  - --filesystem=xdg-data/paladin:create
  # Scoped write into $XDG_CONFIG_HOME/paladin/ — settings live
  # here (auto-lock timeout, clipboard-clear interval, etc.).
  - --filesystem=xdg-config/paladin:create
  # NB: NO `--share=network`. The Flatpak sandbox is the strongest
  # place to enforce the docs/DESIGN.md §3 / §5 "no network, no
  # telemetry" posture, so a future merge that adds network access
  # has to land alongside an explicit plan update first.

modules:
  - name: paladin-gtk
    buildsystem: simple
    build-options:
      env:
        # Pin CARGO_HOME inside the build root so the offline
        # vendored sources resolve deterministically and no
        # build-time fetch is attempted.
        CARGO_HOME: /run/build/paladin-gtk/cargo
    build-commands:
      # Build the release binary against the vendored Cargo cache
      # the source tarball ships. `--offline` is mandatory because
      # the Flatpak sandbox has no network access (finish-args do
      # not declare `--share=network`); `--locked` keeps the
      # build reproducible against the release tag's Cargo.lock.
      - cargo build --release --locked --offline -p paladin-gtk
      # Stage the release binary at /app/bin/paladin-gtk. mode 0755
      # is required because `install -Dm644` would land a non-
      # executable binary and `flatpak run` would fail with EACCES.
      - install -Dm755 target/release/paladin-gtk /app/bin/paladin-gtk
      # Stage the freedesktop .desktop entry. flatpak-builder
      # exports /app/share/applications/<app-id>.desktop to the
      # host's launcher store automatically.
      - install -Dm644 crates/paladin-gtk/data/org.tamx.Paladin.Gui.desktop /app/share/applications/org.tamx.Paladin.Gui.desktop
      # Stage the AppStream metainfo. flatpak-builder exports
      # /app/share/metainfo/<app-id>.metainfo.xml to the host's
      # AppStream pool — the conceptual "/usr/share/metainfo/"
      # location docs/IMPLEMENTATION_PLAN_04_GTK.md §11.4 refers to.
      - install -Dm644 crates/paladin-gtk/data/metainfo/org.tamx.Paladin.Gui.metainfo.xml /app/share/metainfo/org.tamx.Paladin.Gui.metainfo.xml
      # Stage the hicolor icon set. The scalable and symbolic SVGs
      # cover GTK4 / libadwaita icon-theme lookups; PNG sizes round
      # out the legacy launcher fallbacks the freedesktop icon-
      # theme spec resolves. 64 / 128 / 256 / 512 cover the sizes
      # GNOME Shell's app-drawer and search results actually request
      # — without them, Shell falls through to the scalable SVG and
      # the launcher glyph can render blank because the SVG's
      # base64-embedded PNG payload fails GdkPixbuf's icon-theme
      # load path.
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/scalable/apps/org.tamx.Paladin.Gui.svg /app/share/icons/hicolor/scalable/apps/org.tamx.Paladin.Gui.svg
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/symbolic/apps/org.tamx.Paladin.Gui-symbolic.svg /app/share/icons/hicolor/symbolic/apps/org.tamx.Paladin.Gui-symbolic.svg
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/16x16/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/16x16/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/24x24/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/24x24/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/32x32/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/32x32/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/48x48/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/48x48/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/64x64/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/64x64/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/128x128/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/128x128/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/256x256/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/256x256/apps/org.tamx.Paladin.Gui.png
      - install -Dm644 crates/paladin-gtk/data/icons/hicolor/512x512/apps/org.tamx.Paladin.Gui.png /app/share/icons/hicolor/512x512/apps/org.tamx.Paladin.Gui.png
    sources:
      # The release tarball lands at the workspace root inside the
      # sandbox. Path is relative to this manifest file's directory
      # (packaging/flatpak/), so `../..` is the workspace root.
      - type: dir
        path: ../..
