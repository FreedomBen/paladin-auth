# SPDX-License-Identifier: AGPL-3.0-or-later
#
# nfpm manifest for the `paladin-auth-tui` Fedora (.rpm) package.
#
# Per docs/DESIGN.md §11.3 ("Per-front-end packages") and
# docs/IMPLEMENTATION_PLAN_03_TUI.md §"Packaging (per §11)", this
# manifest installs the release binary at `/usr/bin/paladin-auth-tui` and
# the gzipped, clap-derived man page at
# `/usr/share/man/man1/paladin-auth-tui.1.gz`. The man page source is
# produced by `cargo xtask man` (which renders via clap_mangen) and
# gzipped by `cargo xtask package` before nfpm runs.
#
# Runtime dependency is `glibc` only — the TUI is terminal-only and
# never links GTK / libadwaita; minimal Fedora installs (server /
# container images) can pull `paladin-auth-tui` without dragging in a
# desktop dependency chain.
#
# Maintainer scripts are intentionally absent — the TUI never runs
# preinst, postinst, prerm, or postrm hooks. Vault files live under
# `$XDG_DATA_HOME/paladin-auth/` and are only created by `paladin-auth init` or
# the TUI's create-vault screen, so package state and user state are
# kept strictly separate.
#
# The contract pinned by this file is covered by
# `crates/paladin-auth-tui/tests/packaging_rpm_nfpm_manifest_logic.rs`;
# changes here that break that contract fail
# `cargo test --workspace --all-targets` independently of whether
# `nfpm` itself is installed on the runner.

name: paladin-auth-tui
# Inherits from `${PALADIN_AUTH_VERSION}` injected by the release pipeline
# (see docs/IMPLEMENTATION_PLAN_03_TUI.md §"Reproducible builds"). The
# release tag drives the value so the .rpm version, the workspace
# `[workspace.package].version`, and the man-page footer all stay in
# lockstep.
version: ${PALADIN_AUTH_VERSION}
release: 1
platform: linux
arch: amd64

maintainer: Paladin Auth maintainers <maintainers@paladin-auth.tamx.org>
description: "Paladin Auth: Rust OTP authenticator (TOTP + HOTP) terminal UI"
vendor: Paladin Auth
homepage: https://paladin-auth.tamx.org
license: AGPL-3.0-or-later

depends:
  - glibc

contents:
  # Release binary. mode: 0755 is required because nfpm defaults file
  # mode to 0644, which would land a non-executable binary in /usr/bin.
  - src: target/release/paladin-auth-tui
    dst: /usr/bin/paladin-auth-tui
    file_info:
      mode: 0755

  # Gzipped man page produced by `cargo xtask package` (which calls
  # `xtask::man::render_all_gzipped`). The .gz suffix is required by
  # man(1) compression conventions on Fedora — `man paladin-auth-tui` finds
  # `paladin-auth-tui.1.gz` via mandb's compressed-page lookup.
  - src: target/man/paladin-auth-tui.1.gz
    dst: /usr/share/man/man1/paladin-auth-tui.1.gz
    file_info:
      mode: 0644
