# SPDX-License-Identifier: AGPL-3.0-or-later
#
# nfpm manifest for the `paladin` CLI Fedora (.rpm) package.
#
# Per docs/DESIGN.md §11.3 ("Per-front-end packages") and
# docs/IMPLEMENTATION_PLAN_02_CLI.md §"Packaging (per §11)", this
# manifest installs the release binary at `/usr/bin/paladin` and the
# gzipped, clap-derived man page at
# `/usr/share/man/man1/paladin.1.gz`. The man page source is
# produced by `cargo xtask man` (which renders via clap_mangen) and
# gzipped by `cargo xtask package` before nfpm runs.
#
# Runtime dependency is `glibc` only — the CLI is otherwise statically
# linked where possible (no OpenSSL, no libsqlite, no libcurl), so
# minimal Fedora installs (server / container images) can pull
# `paladin` without dragging in a desktop dependency chain. This is
# the headless-friendly footprint §11.3 promises.
#
# Maintainer scripts are intentionally absent — the CLI never runs
# preinst, postinst, prerm, or postrm hooks. Vault files live under
# `$XDG_DATA_HOME/paladin/` and are only created by `paladin init`,
# so package state and user state are kept strictly separate.
#
# The contract pinned by this file is covered by
# `crates/paladin-cli/tests/packaging_rpm_nfpm_manifest_logic.rs`;
# changes here that break that contract fail
# `cargo test --workspace --all-targets` independently of whether
# `nfpm` itself is installed on the runner.

name: paladin
# Inherits from `${PALADIN_VERSION}` injected by the release pipeline
# (see docs/IMPLEMENTATION_PLAN_02_CLI.md §"Reproducible builds"). The
# release tag drives the value so the .rpm version, the workspace
# `[workspace.package].version`, and the man-page footer all stay in
# lockstep.
version: ${PALADIN_VERSION}
release: 1
platform: linux
arch: amd64

maintainer: Paladin maintainers <maintainers@paladin.tamx.org>
description: "Paladin: Rust OTP authenticator (TOTP + HOTP) CLI"
vendor: Paladin
homepage: https://paladin.tamx.org
license: AGPL-3.0-or-later

depends:
  - glibc

contents:
  # Release binary. mode: 0755 is required because nfpm defaults file
  # mode to 0644, which would land a non-executable binary in /usr/bin.
  - src: target/release/paladin
    dst: /usr/bin/paladin
    file_info:
      mode: 0755

  # Gzipped man page produced by `cargo xtask package` (which calls
  # `xtask::man::render_all_gzipped`). The .gz suffix is required by
  # man(1) compression conventions on Fedora — `man paladin` finds
  # `paladin.1.gz` via mandb's compressed-page lookup.
  - src: target/man/paladin.1.gz
    dst: /usr/share/man/man1/paladin.1.gz
    file_info:
      mode: 0644
