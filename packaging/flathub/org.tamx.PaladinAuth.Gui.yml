# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Flathub submission manifest for paladin-auth-gtk.
#
# This file is the artifact that gets PR'd to
# https://github.com/flathub/flathub to register the new app
# `org.tamx.PaladinAuth.Gui` (docs/DESIGN.md §11.4: "Publication. Flathub.
# Each front-end is its own Flathub submission with its own review
# thread and update cadence."). Once Flathub accepts the
# submission, this same file lives at the root of the resulting
# app repo `https://github.com/flathub/org.tamx.PaladinAuth.Gui` as
# `org.tamx.PaladinAuth.Gui.yml`, and Flathub's builder rebuilds the
# app on every commit there.
#
# Per-release update procedure (see ./README.md for the full
# rundown):
#   1. Stamp the `tag:` / `commit:` below to the new release tag
#      and its commit SHA.
#   2. Regenerate `cargo-sources.json` against the new tag via
#      `flatpak-cargo-generator` (the release pipeline runs this).
#   3. Open a PR against `flathub/org.tamx.PaladinAuth.Gui` carrying
#      the updated manifest + regenerated cargo-sources.json.
#
# Distinct from `packaging/flatpak/paladin-auth-gtk.yml`: that manifest
# powers the local packaging dry-run (`type: dir, path: ../..`) so
# CI builds against the workspace tree. This one targets Flathub's
# build infra, which has no access to the local checkout — the
# source pointer therefore has to be an upstream `type: git`
# pointing at the tagged release.
#
# Signing: per docs/DESIGN.md §11.4 / §11.6 ("Flatpak releases inherit
# Flathub's signing"), Flathub signs every published build with
# its own key. The release pipeline's `packaging/sign/sign-artifact.sh`
# is therefore NOT invoked for the Flatpak output — only for the
# `.deb` / `.rpm` / AppImage artifacts hosted on GitHub Releases.
app-id: org.tamx.PaladinAuth.Gui
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: paladin-auth-gtk
finish-args:
  # Wayland is the primary display socket on modern GNOME / KDE.
  - --socket=wayland
  # X11 fallback covers sessions where Wayland is unavailable.
  - --socket=fallback-x11
  # IPC is required for `gdk::Clipboard` (copy / paste of OTP
  # codes and clipboard image imports for QR add).
  - --share=ipc
  # Scoped write into `$XDG_DATA_HOME/paladin-auth/` — where the vault
  # files live (docs/DESIGN.md §4). `:create` lets paladin-auth-gtk create
  # the directory on first run; nothing outside that namespace is
  # reachable.
  - --filesystem=xdg-data/paladin-auth:create
  # Scoped write into `$XDG_CONFIG_HOME/paladin-auth/` — settings live
  # here (auto-lock timeout, clipboard-clear interval, etc.).
  - --filesystem=xdg-config/paladin-auth:create
  # NB: NO `--share=network`. The Flatpak sandbox is the strongest
  # place to enforce the docs/DESIGN.md §3 / §5 "no network, no
  # telemetry" posture, so a future merge that adds network access
  # has to land alongside an explicit plan update first.
build-options:
  # Build with no network access: vendored cargo deps land via
  # `cargo-sources.json`, and the build commands set
  # `CARGO_NET_OFFLINE=true` so any cargo invocation that tries to
  # reach the network fails the build instead of silently waiting.
  env:
    CARGO_HOME: /run/build/paladin-auth-gtk/cargo
    CARGO_NET_OFFLINE: "true"
modules:
  - name: paladin-auth-gtk
    buildsystem: simple
    build-commands:
      # Build the release binary against the vendored cargo deps.
      # `--locked` keeps the lockfile authoritative; `--offline`
      # mirrors the sandbox's lack of network access at build time;
      # `--release` is the artifact shape docs/DESIGN.md §11.6 requires.
      - cargo build --release --locked --offline -p paladin-auth-gtk
      # Stage the release binary at /app/bin/paladin-auth-gtk. mode 0755
      # is required because `install -Dm644` would land a non-
      # executable binary and `flatpak run` would fail with EACCES.
      - install -Dm755 target/release/paladin-auth-gtk /app/bin/paladin-auth-gtk
      # Stage the freedesktop .desktop entry. flatpak-builder
      # exports /app/share/applications/<app-id>.desktop to the
      # host's launcher store automatically.
      - install -Dm644 crates/paladin-auth-gtk/data/org.tamx.PaladinAuth.Gui.desktop /app/share/applications/org.tamx.PaladinAuth.Gui.desktop
      # Stage the AppStream metainfo. flatpak-builder exports
      # /app/share/metainfo/<app-id>.metainfo.xml to the host's
      # AppStream pool — the conceptual "/usr/share/metainfo/"
      # location docs/IMPLEMENTATION_PLAN_04_GTK.md §11.4 refers to.
      - install -Dm644 crates/paladin-auth-gtk/data/metainfo/org.tamx.PaladinAuth.Gui.metainfo.xml /app/share/metainfo/org.tamx.PaladinAuth.Gui.metainfo.xml
      # Stage the hicolor icon set. The scalable and symbolic SVGs
      # cover GTK4 / libadwaita icon-theme lookups; PNG sizes round
      # out the legacy launcher fallbacks the freedesktop icon-
      # theme spec resolves. 64 / 128 / 256 / 512 cover the sizes
      # GNOME Shell's app-drawer and search results actually request
      # — without them, Shell falls through to the scalable SVG and
      # the launcher glyph can render blank because the SVG's
      # base64-embedded PNG payload fails GdkPixbuf's icon-theme
      # load path.
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/scalable/apps/org.tamx.PaladinAuth.Gui.svg /app/share/icons/hicolor/scalable/apps/org.tamx.PaladinAuth.Gui.svg
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/symbolic/apps/org.tamx.PaladinAuth.Gui-symbolic.svg /app/share/icons/hicolor/symbolic/apps/org.tamx.PaladinAuth.Gui-symbolic.svg
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/16x16/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/16x16/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/24x24/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/24x24/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/32x32/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/32x32/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/48x48/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/48x48/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/64x64/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/64x64/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/128x128/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/128x128/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/256x256/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/256x256/apps/org.tamx.PaladinAuth.Gui.png
      - install -Dm644 crates/paladin-auth-gtk/data/icons/hicolor/512x512/apps/org.tamx.PaladinAuth.Gui.png /app/share/icons/hicolor/512x512/apps/org.tamx.PaladinAuth.Gui.png
    sources:
      # Upstream source: tagged release of the paladin-auth workspace.
      # `tag:` + `commit:` are stamped by the release pipeline
      # before the per-release Flathub PR lands (see ./README.md).
      # Placeholder values track the v0.2.0 milestone scope; the
      # actual commit SHA is filled in by
      # `scripts/release/stamp-flathub-source.sh` when the tag is
      # cut.
      - type: git
        url: https://github.com/FreedomBen/paladin-auth.git
        tag: v0.2.0
        # commit: <stamped at release time>
      # Vendored Cargo crates the build resolves with --offline.
      # `cargo-sources.json` is regenerated per release via
      # `flatpak-cargo-generator` against the new tag's Cargo.lock
      # — never hand-edited (see ./README.md).
      - cargo-sources.json
