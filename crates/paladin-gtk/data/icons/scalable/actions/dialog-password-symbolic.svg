<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPDX-License-Identifier: AGPL-3.0-or-later

  Paladin row placeholder icon: a stylized lock used when a row's
  `AccountSummary.icon_hint` is `None`, empty, or unresolved against the
  system icon theme. Shipped inside the gresource bundle at
  `/org/tamx/Paladin/Gui/icons/scalable/actions/dialog-password-symbolic.svg`
  so the `IconTheme` lookup keyed by `icon_resolution::PLACEHOLDER_ICON_NAME`
  ("dialog-password-symbolic") resolves identically in native and Flatpak
  builds even when the sandboxed runtime omits the system symbolic.

  The path uses `currentColor` so GTK's symbolic-icon machinery can recolor
  it against the active foreground per `gtk::STYLE_PROVIDER_PRIORITY_APPLICATION`.
-->
