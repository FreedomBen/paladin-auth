<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPDX-License-Identifier: AGPL-3.0-or-later

  Paladin GTK app icon (symbolic variant) per
  IMPLEMENTATION_PLAN_04_GTK.md §"Linux desktop integration".

  Installs verbatim at
  /usr/share/icons/hicolor/symbolic/apps/org.tamx.Paladin.Gui-symbolic.svg
  in both the native (.deb / .rpm) and Flatpak packaging formats.

  Symbolic icons use currentColor so the Adwaita palette can recolor
  them against the active foreground — a hardcoded fill renders
  tinted-wrong on dark themes. The artwork is drawn at the GNOME HIG
  16x16 symbolic viewport so the renderer can scale up without
  losing crispness at toolbar / menubar sizes.
-->
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="16"
    height="16"
    viewBox="0 0 16 16"
    version="1.1">
  <title>Paladin</title>
  <!--
    Shield silhouette drawn as a single filled path. Using
    fill="currentColor" lets the Adwaita engine tint it for the
    active foreground (light theme → dark glyph; dark theme → light
    glyph) without per-theme assets.
  -->
  <path d="M 8 1
           L 2 3
           L 2 8
           C 2 11 4 13 8 15
           C 12 13 14 11 14 8
           L 14 3 Z
           M 8 3
           C 8 3 8 3 8 3
           L 12 4.2
           L 12 8
           C 12 10 10.5 11.5 8 12.8
           C 5.5 11.5 4 10 4 8
           L 4 4.2 Z"
        fill="currentColor"
        fill-rule="evenodd"/>
  <!--
    Keyhole inside the shield. Two glyphs (circle + tapered slot)
    keep the symbolic readable at 16x16.
  -->
  <circle cx="8" cy="7" r="1.2" fill="currentColor"/>
  <path d="M 7.3 8
           L 8.7 8
           L 8.4 10.2
           L 7.6 10.2 Z"
        fill="currentColor"/>
</svg>
