name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain (rustup respects rust-toolchain.toml)
        run: rustup show
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    # The workspace includes `paladin-auth-gtk`, which binds `gtk4` `v4_16`
    # and `libadwaita` `v1_6` per docs/IMPLEMENTATION_PLAN_04_GTK.md
    # §"Dependencies (per §9)". The `ubuntu-24.04` image ships GTK 4.14
    # and libadwaita 1.5 — too old for those `v*` feature gates, so the
    # `gtk4-sys` / `libadwaita-sys` build scripts reject it. Build
    # inside a Fedora 42 container so the system headers satisfy the
    # version floor the plan locked in.
    container:
      image: fedora:42
    steps:
      - name: Install system dependencies (GTK4 + libadwaita + Rust)
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rustup gcc pkg-config openssl-devel \
            gtk4-devel libadwaita-devel \
            git ca-certificates
          rustup-init -y --no-modify-path --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@v6
      - run: rustup show
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    # Same Fedora 42 container as `clippy` for the GTK 4.16 / libadwaita
    # 1.6 floor; additionally installs `xorg-x11-server-Xvfb` so
    # `crates/paladin-auth-gtk/tests/gtk_smoke.rs` runs under `xvfb-run`
    # instead of skipping. The §"Smoke test" bullet in
    # docs/IMPLEMENTATION_PLAN_04_GTK.md gates Milestone 7 sign-off on that
    # test being green.
    container:
      image: fedora:42
    steps:
      - name: Install system dependencies (GTK4 + libadwaita + Xvfb + Rust)
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rustup gcc pkg-config openssl-devel \
            gtk4-devel libadwaita-devel \
            xorg-x11-server-Xvfb \
            git ca-certificates
          rustup-init -y --no-modify-path --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@v6
      - run: rustup show
      - run: cargo test --workspace --all-targets

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - run: cargo deny check

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - run: cargo audit

  public-api:
    name: cargo public-api snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable Rust toolchain (respects rust-toolchain.toml)
        run: rustup show
      - name: Install nightly toolchain (cargo-public-api needs rustdoc JSON)
        run: rustup toolchain install nightly --profile minimal
      - name: Install pinned cargo-public-api
        run: cargo install --locked 'cargo-public-api@^0.51'
      - name: Regenerate snapshot
        run: cargo public-api -p paladin-auth-core --simplified --color=never > /tmp/public-api.txt
      - name: Diff against committed snapshot
        run: |
          if ! diff -u crates/paladin-auth-core/public-api.txt /tmp/public-api.txt; then
            echo "::error::Public API surface changed. Update crates/paladin-auth-core/public-api.txt or revert the change."
            exit 1
          fi

  packaging-dry-run:
    name: packaging dry-run (.deb / .rpm + installed-payload validators)
    runs-on: ubuntu-latest
    # Per docs/IMPLEMENTATION_PLAN_04_GTK.md Milestone 7 checklist entry
    # "Add the packaging dry-run job to CI: produces .deb, .rpm, Flatpak,
    # and AppImage artifacts and runs desktop-file-validate plus the
    # AppStream validator on the installed payload", this job exercises
    # the nfpm-driven .deb and .rpm pipelines end-to-end:
    #
    #   1. Builds the release binary with --release --locked (same flag
    #      set the §11.6 reproducibility gate locks in for the AppImage
    #      script via tests/packaging_reproducible_build_logic.rs).
    #   2. Produces a .deb via the in-tree packaging/deb/paladin-auth-gtk.yaml
    #      nfpm manifest, then a .rpm via packaging/rpm/paladin-auth-gtk.yaml.
    #   3. Extracts each artifact into a staging directory (dpkg-deb -x
    #      for the .deb, rpm2cpio | cpio for the .rpm) so the validators
    #      check the installed payload — not just the source-tree
    #      originals the existing `desktop-metainfo` job covers.
    #   4. Runs `desktop-file-validate` against the extracted .desktop
    #      file and `appstreamcli validate --no-net` against the
    #      extracted AppStream metainfo. A regression in either nfpm
    #      manifest that drops or relocates one of those files therefore
    #      fails CI immediately, even though the source-tree originals
    #      stay valid.
    #
    # GTK4 + libadwaita 1.6 floor: the release binary build depends on
    # the gtk4-sys / libadwaita-sys crates' >= 1.6 + GTK 4.16 feature
    # gates, and ubuntu-24.04 ships GTK 4.14 / libadwaita 1.5. The job
    # therefore runs inside the `fedora:42` container (matching the
    # clippy / test jobs above) so the system headers satisfy the
    # version floor without a PPA dance.
    #
    # Flatpak + AppImage dry-runs land in follow-up workflow commits —
    # both require additional runtime setup (flatpak-builder + Flathub
    # remote for Flatpak; linuxdeploy + linuxdeploy-plugin-gtk for
    # AppImage) that is out of scope for this contract. The Flatpak
    # manifest is already pinned by
    # crates/paladin-auth-gtk/tests/packaging_flatpak_manifest_logic.rs and
    # the AppImage assembly script by
    # crates/paladin-auth-gtk/tests/packaging_appimage_build_script_logic.rs;
    # those text-level tests run on every push regardless of this job.
    #
    # Contract pinned by
    # crates/paladin-auth-gtk/tests/ci_packaging_dry_run_logic.rs.
    container:
      image: fedora:42
    env:
      # The nfpm manifests reference `${PALADIN_AUTH_VERSION}` (see the
      # `version: ${PALADIN_AUTH_VERSION}` lines in both YAMLs). The
      # release pipeline derives this from the release tag; the CI
      # dry-run uses a sentinel since no tag is in flight on a push /
      # PR run. The string only needs to be a syntactically valid
      # version — the actual workspace version stays authoritative.
      PALADIN_AUTH_VERSION: "0.0.1-ci-dry-run"
    steps:
      - name: Install system dependencies (GTK4 + libadwaita + extractors + validators + Rust)
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rustup gcc pkg-config openssl-devel \
            gtk4-devel libadwaita-devel \
            dpkg cpio rpm-build \
            desktop-file-utils appstream \
            curl tar git ca-certificates
          rustup-init -y --no-modify-path --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@v6
      - name: Show pinned toolchain
        run: rustup show
      - name: Install nfpm
        # The deb / rpm builder both nfpm manifests target. Installed
        # from the upstream GitHub release artifact so the version
        # stays pinned (a `dnf install nfpm` is not available on
        # Fedora; `go install` would pull HEAD).
        run: |
          NFPM_VERSION="2.41.3"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version
      - name: Build release binary
        # --release for the release-profile binary, --locked for
        # reproducibility per DESIGN §11.6 (parity with the AppImage
        # script's `cargo build --release --locked` fallback).
        run: cargo build --release --locked -p paladin-auth-gtk
      - name: Build .deb via nfpm
        # `mkdir -p target/dist` must run first: nfpm v2.41.3's `-t`
        # auto-naming only triggers when `os.Stat` finds the target as
        # an existing directory. Without it, the bare `target/dist/`
        # with a trailing slash fails the `os.Create` step with EISDIR
        # on Linux.
        run: |
          mkdir -p target/dist
          nfpm package -f packaging/deb/paladin-auth-gtk.yaml -p deb -t target/dist/
      - name: Build .rpm via nfpm
        run: |
          mkdir -p target/dist
          nfpm package -f packaging/rpm/paladin-auth-gtk.yaml -p rpm -t target/dist/
      - name: Extract .deb payload into target/dist/deb-extracted/
        run: |
          mkdir -p target/dist/deb-extracted
          DEB_FILE="$(ls target/dist/paladin-auth-gtk_*.deb | head -n1)"
          dpkg-deb -x "${DEB_FILE}" target/dist/deb-extracted
      - name: Extract .rpm payload into target/dist/rpm-extracted/
        run: |
          mkdir -p target/dist/rpm-extracted
          RPM_FILE="$(ls target/dist/paladin-auth-gtk-*.rpm | head -n1)"
          ( cd target/dist/rpm-extracted && rpm2cpio "../../../${RPM_FILE}" | cpio -idm )
      - name: Validate installed .desktop entry (from .deb payload)
        run: |
          desktop-file-validate \
            target/dist/deb-extracted/usr/share/applications/org.tamx.PaladinAuth.Gui.desktop
      - name: Validate installed AppStream metainfo (from .deb payload)
        # `--no-net` keeps the validator off the network so the job
        # never depends on external URLs being reachable. The
        # substantive schema / required-fields checks still run.
        run: |
          appstreamcli validate --no-net \
            target/dist/deb-extracted/usr/share/metainfo/org.tamx.PaladinAuth.Gui.metainfo.xml
      - name: Validate installed .desktop entry (from .rpm payload)
        run: |
          desktop-file-validate \
            target/dist/rpm-extracted/usr/share/applications/org.tamx.PaladinAuth.Gui.desktop
      - name: Validate installed AppStream metainfo (from .rpm payload)
        run: |
          appstreamcli validate --no-net \
            target/dist/rpm-extracted/usr/share/metainfo/org.tamx.PaladinAuth.Gui.metainfo.xml

  desktop-metainfo:
    name: desktop-file-validate + appstreamcli validate
    runs-on: ubuntu-latest
    # Per docs/IMPLEMENTATION_PLAN_04_GTK.md §"Linux desktop integration" /
    # §"Packaging (per §11)", the v0.2 GUI ships a freedesktop desktop
    # entry and an AppStream metainfo file under
    # `crates/paladin-auth-gtk/data/`. The §11 packaging dry-run validates
    # both with `desktop-file-validate` and the AppStream validator
    # respectively; this job runs the same checks on every push so a
    # malformed `.desktop` or metainfo file fails CI before it reaches
    # a packaging build.
    steps:
      - uses: actions/checkout@v6
      - name: Install desktop-file-utils + appstream
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            desktop-file-utils \
            appstream
      - name: Validate desktop entry
        run: |
          desktop-file-validate \
            crates/paladin-auth-gtk/data/org.tamx.PaladinAuth.Gui.desktop
      - name: Validate AppStream metainfo
        # `--no-net` skips the URL-reachability checks so the
        # validator never depends on network access. The substantive
        # schema / required-fields checks still run.
        run: |
          appstreamcli validate --no-net \
            crates/paladin-auth-gtk/data/metainfo/org.tamx.PaladinAuth.Gui.metainfo.xml
