name: Release

# Triggered by pushing a SemVer tag (`v0.2.0`, `v0.2.0-rc1`, ...) or manually
# via workflow_dispatch. On a tag push, builds the .rpm and .deb sets
# (paladin, paladin-tui, paladin-gtk) and attaches them to the matching
# GitHub release. workflow_dispatch runs the same build end-to-end but
# skips the upload — useful for verifying packaging changes without
# cutting a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to bake into the artifacts (workflow_dispatch only — no release is created)"
        required: true
        default: "0.0.0-dispatch"

permissions:
  contents: write

jobs:
  release:
    name: build packages + attach to GitHub release
    runs-on: ubuntu-latest
    # GTK 4.16 / libadwaita 1.6 floor — same container the packaging-dry-run
    # job in ci.yml uses, so the release pipeline exercises the exact same
    # toolchain + system headers the CI gate validates on every push.
    container:
      image: fedora:42
    steps:
      - name: Install system dependencies (GTK4 + libadwaita + extractors + validators + Rust)
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            rustup gcc pkg-config openssl-devel \
            gtk4-devel libadwaita-devel \
            dpkg cpio rpm-build \
            desktop-file-utils appstream \
            curl tar git ca-certificates
          rustup-init -y --no-modify-path --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v6

      - name: Show pinned toolchain
        run: rustup show

      - name: Derive PALADIN_VERSION from tag or dispatch input
        # Tag form `v0.2.0` -> `0.2.0`. The nfpm manifests reference
        # `${PALADIN_VERSION}` directly (see packaging/{deb,rpm}/*.yaml).
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            REF="${GITHUB_REF_NAME}"
            echo "PALADIN_VERSION=${REF#v}" >> "${GITHUB_ENV}"
          else
            echo "PALADIN_VERSION=${{ inputs.version }}" >> "${GITHUB_ENV}"
          fi

      - name: Install nfpm (pin matches ci.yml packaging-dry-run)
        run: |
          NFPM_VERSION="2.41.3"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build release binaries (CLI + TUI + GTK)
        # --release --locked matches the CI dry-run and the DESIGN §11.6
        # reproducibility gate (same flag set the AppImage assembly script
        # uses for its `cargo build --release --locked` fallback).
        run: |
          cargo build --release --locked \
            -p paladin-cli -p paladin-tui -p paladin-gtk

      - name: Render + gzip man pages (CLI + TUI)
        # `packaging/rpm/paladin.yaml` and `packaging/rpm/paladin-tui.yaml`
        # reference `target/man/<name>.1.gz`. The xtask renders the raw
        # `.1` files; gzip with `-n` strips the filename/timestamp from
        # the header so the output stays deterministic (§11.6).
        run: |
          cargo run -p xtask --quiet -- man
          gzip -n -9 -f target/man/paladin.1 target/man/paladin-tui.1
          ls -l target/man/

      - name: Build .rpm packages via nfpm (CLI, TUI, GTK)
        run: |
          mkdir -p target/dist
          nfpm package -f packaging/rpm/paladin.yaml      -p rpm -t target/dist/
          nfpm package -f packaging/rpm/paladin-tui.yaml  -p rpm -t target/dist/
          nfpm package -f packaging/rpm/paladin-gtk.yaml  -p rpm -t target/dist/

      - name: Build .deb packages via nfpm (CLI, TUI, GTK)
        run: |
          mkdir -p target/dist
          nfpm package -f packaging/deb/paladin.yaml      -p deb -t target/dist/
          nfpm package -f packaging/deb/paladin-tui.yaml  -p deb -t target/dist/
          nfpm package -f packaging/deb/paladin-gtk.yaml  -p deb -t target/dist/

      - name: Extract paladin-gtk .deb payload for validation
        run: |
          mkdir -p target/dist/deb-extracted
          DEB_FILE="$(ls target/dist/paladin-gtk_*.deb | head -n1)"
          dpkg-deb -x "${DEB_FILE}" target/dist/deb-extracted

      - name: Extract paladin-gtk .rpm payload for validation
        run: |
          mkdir -p target/dist/rpm-extracted
          RPM_FILE="$(ls target/dist/paladin-gtk-*.rpm | head -n1)"
          ( cd target/dist/rpm-extracted && rpm2cpio "../../../${RPM_FILE}" | cpio -idm )

      - name: Validate .deb installed payload (desktop + AppStream)
        # Parity with the ci.yml packaging-dry-run job: a regression that
        # drops or relocates the .desktop / metainfo files fails the
        # release before any artifact is uploaded.
        run: |
          desktop-file-validate \
            target/dist/deb-extracted/usr/share/applications/org.tamx.Paladin.Gui.desktop
          appstreamcli validate --no-net \
            target/dist/deb-extracted/usr/share/metainfo/org.tamx.Paladin.Gui.metainfo.xml

      - name: Validate .rpm installed payload (desktop + AppStream)
        run: |
          desktop-file-validate \
            target/dist/rpm-extracted/usr/share/applications/org.tamx.Paladin.Gui.desktop
          appstreamcli validate --no-net \
            target/dist/rpm-extracted/usr/share/metainfo/org.tamx.Paladin.Gui.metainfo.xml

      - name: List built artifacts
        run: ls -lh target/dist/*.rpm target/dist/*.deb

      - name: Attach artifacts to GitHub release
        # Tag-push only: workflow_dispatch runs are dry-runs that exercise
        # the build + validators without publishing anything.
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dist/*.rpm
            target/dist/*.deb
          # Any tag with a hyphen (e.g. v0.2.0-rc1) is marked as a prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          generate_release_notes: true
